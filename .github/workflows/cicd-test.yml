---
name: ♻️ Test

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  package:
    name: Package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Package
        id: package
        shell: bash
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          make package
